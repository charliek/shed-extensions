name: CI

on:
  push:
    branches: [main, 'feature/*']
  pull_request:
    branches: [main, 'feature/*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      # Check out shed SDK for the replace directive
      - uses: actions/checkout@v6
        with:
          repository: charliek/shed
          ref: feature/extension-system
          path: shed
          sparse-checkout: sdk
      - run: sed -i 's|=> ../shed/sdk|=> ./shed/sdk|' go.mod
      - run: go test -v ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      # Check out shed SDK for the replace directive
      - uses: actions/checkout@v6
        with:
          repository: charliek/shed
          ref: feature/extension-system
          path: shed
          sparse-checkout: sdk
      - run: sed -i 's|=> ../shed/sdk|=> ./shed/sdk|' go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
