version: 2

project_name: shed-extensions

before:
  hooks:
    - go mod tidy

builds:
  - id: shed-host-agent
    binary: shed-host-agent
    main: ./cmd/shed-host-agent
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/charliek/shed-extensions/internal/version.Version={{.Version}}
      - -X github.com/charliek/shed-extensions/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/charliek/shed-extensions/internal/version.BuildDate={{.Date}}

  - id: shed-ssh-agent
    binary: shed-ssh-agent
    main: ./cmd/shed-ssh-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/charliek/shed-extensions/internal/version.Version={{.Version}}
      - -X github.com/charliek/shed-extensions/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/charliek/shed-extensions/internal/version.BuildDate={{.Date}}

  # Phase 2: uncomment when shed-aws-proxy is implemented
  # - id: shed-aws-proxy
  #   binary: shed-aws-proxy
  #   main: ./cmd/shed-aws-proxy
  #   env:
  #     - CGO_ENABLED=0
  #   goos:
  #     - linux
  #   goarch:
  #     - amd64
  #     - arm64
  #   ldflags:
  #     - -s -w
  #     - -X github.com/charliek/shed-extensions/internal/version.Version={{.Version}}
  #     - -X github.com/charliek/shed-extensions/internal/version.GitCommit={{.ShortCommit}}
  #     - -X github.com/charliek/shed-extensions/internal/version.BuildDate={{.Date}}

archives:
  - id: shed-host-agent
    ids:
      - shed-host-agent
    formats:
      - tar.gz
    name_template: "shed-host-agent_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

  - id: shed-ssh-agent
    ids:
      - shed-ssh-agent
    formats:
      - tar.gz
    name_template: "shed-ssh-agent_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: charliek
    name: shed-extensions
  draft: false
  prerelease: auto
  mode: replace

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
