version: 2

project_name: shed-extensions

before:
  hooks:
    - go mod tidy

builds:
  - id: shed-host-agent-darwin
    binary: shed-host-agent
    main: ./cmd/shed-host-agent
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/charliek/shed-extensions/internal/version.Version={{.Version}}
      - -X github.com/charliek/shed-extensions/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/charliek/shed-extensions/internal/version.BuildDate={{.Date}}

  - id: shed-host-agent-linux
    binary: shed-host-agent
    main: ./cmd/shed-host-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/charliek/shed-extensions/internal/version.Version={{.Version}}
      - -X github.com/charliek/shed-extensions/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/charliek/shed-extensions/internal/version.BuildDate={{.Date}}

archives:
  - id: shed-host-agent
    ids:
      - shed-host-agent-darwin
      - shed-host-agent-linux
    formats:
      - tar.gz
    name_template: "shed-host-agent_{{ .Os }}_{{ .Arch }}"
    files:
      - src: configs/extensions.example.yaml
        dst: .
        strip_parent: true

brews:
  - name: shed-host-agent
    ids:
      - shed-host-agent
    repository:
      owner: charliek
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/charliek/shed-extensions"
    description: "Host-side credential brokering agent for shed VMs"
    license: "MIT"
    install: |
      bin.install "shed-host-agent"
      (etc/"shed").mkpath
      (etc/"shed").install "extensions.example.yaml" => "extensions.yaml" unless (etc/"shed/extensions.yaml").exist?
    service: |
      run [opt_bin/"shed-host-agent", "-config", etc/"shed/extensions.yaml"]
      keep_alive true
      log_path var/"log/shed-host-agent.log"
      error_log_path var/"log/shed-host-agent.log"
    caveats: |
      The shed-host-agent config has been installed to:
        #{HOMEBREW_PREFIX}/etc/shed/extensions.yaml

      Update that file with your shed server URL and any credential
      settings before starting the service.

      To start shed-host-agent as a background service:
        brew services start shed-host-agent

      Logs: #{var}/log/shed-host-agent.log
    test: |
      assert_predicate bin/"shed-host-agent", :executable?

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: charliek
    name: shed-extensions
  draft: false
  prerelease: auto
  mode: replace

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
